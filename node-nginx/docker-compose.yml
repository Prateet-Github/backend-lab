services:
  app-1:
    image: express-lab
    environment:
      - INSTANCE_ID=1
      - PORT=5001
    expose:
      - "5001"

  app-2:
    image: express-lab
    environment:
      - INSTANCE_ID=2
      - PORT=5001
    expose:
      - "5001"

  app-3:
    image: express-lab
    environment:
      - INSTANCE_ID=3
      - PORT=5001
    expose:
      - "5001"

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3